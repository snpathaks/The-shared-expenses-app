<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Shared Expenses</title>
  <meta name="description" content="Sign in to Shared Expenses — the smart way for roommates to track expenses, balances and settlements." />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Login-specific styles ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      position: relative;
      overflow: hidden;
    }

    /* Animated background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7C3AED, transparent 70%);
      top: -150px; left: -150px;
      animation-duration: 10s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #10B981, transparent 70%);
      bottom: -100px; right: -100px;
      animation-duration: 12s;
      animation-delay: -3s;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #F59E0B, transparent 70%);
      top: 50%; right: 30%;
      animation-duration: 9s;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid lines */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* ── Login Card ── */
    .login-card {
      width: 100%;
      max-width: 460px;
      background: rgba(14, 18, 32, 0.85);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-xl);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      padding: var(--space-2xl);
      position: relative;
      z-index: 1;
      animation: cardEntrance 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Subtle top border glow */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.8), transparent);
    }

    /* ── Header ── */
    .login-header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }

    .logo-wrapper {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
      box-shadow: 0 8px 32px rgba(124,58,237,0.4), 0 0 0 8px rgba(124,58,237,0.08);
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    .logo-wrapper svg { color: #fff; }

    .login-app-name {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-app-name span { color: var(--brand-primary-light); }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ── Form ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--brand-primary-light);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition-fast);
    }
    .forgot-link:hover { color: #C4B5FD; text-decoration: underline; }

    .form-row-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    /* Shimmer effect on login button */
    .btn-login::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
    }
    .btn-login:hover::after {
      animation: shimmerBtn 0.7s ease forwards;
    }

    @keyframes shimmerBtn {
      to { left: 150%; }
    }

    /* ── Google Button ── */
    .btn-google {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition-normal);
      font-family: inherit;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.20);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: scale(0.99); }

    /* ── Sign up row ── */
    .signup-row {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding-top: var(--space-sm);
    }

    .signup-row a {
      color: var(--brand-primary-light);
      font-weight: 600;
    }

    /* ── Success overlay ── */
    .success-overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      background: rgba(14,18,32,0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      z-index: 10;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition-normal);
      padding: var(--space-xl);
    }

    .success-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .success-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(16,185,129,0.15);
      border: 2px solid var(--brand-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.4s ease 0.1s both;
    }

    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .success-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .success-msg {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* ── Password strength indicator ── */
    .pwd-strength {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }
    .pwd-strength-bar {
      flex: 1; height: 3px; border-radius: 3px;
      background: var(--border-subtle);
      transition: background 0.3s;
    }
    .pwd-strength-bar.weak   { background: var(--brand-danger); }
    .pwd-strength-bar.fair   { background: var(--brand-accent); }
    .pwd-strength-bar.strong { background: var(--brand-secondary); }

    @media (max-width: 480px) {
      .login-card { padding: var(--space-xl); }
    }
  </style>
</head>
<body>
  <!-- Background decorations -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

  <!-- Login Card -->
  <main class="login-card" role="main" aria-label="Login form">

    <!-- Success State Overlay -->
    <div class="success-overlay" id="successOverlay" aria-live="polite">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>
      <div class="success-title">Welcome back! 🎉</div>
      <p class="success-msg">Signed in successfully. Redirecting to your dashboard…</p>
      <div class="progress-bar" style="width:200px">
        <div class="progress-fill" id="redirectProgress" style="width:0%"></div>
      </div>
    </div>

    <!-- Header -->
    <header class="login-header">
      <div class="logo-wrapper" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20h20"/>
          <path d="M5 20V8l7-6 7 6v12"/>
          <path d="M9 20v-5h6v5"/>
          <circle cx="12" cy="10" r="1" fill="white"/>
        </svg>
      </div>
      <h1 class="login-app-name">Shared<span>Expenses</span></h1>
      <p class="login-subtitle">Track expenses, balances and settlements</p>
    </header>

    <!-- Form -->
    <form class="login-form" id="loginForm" novalidate>

      <!-- Email Field -->
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input
            class="form-input has-icon"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            aria-describedby="emailError"
            aria-required="true"
          />
        </div>
        <span class="form-error" id="emailError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            class="form-input has-icon"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            aria-describedby="passwordError"
            aria-required="true"
            style="padding-right: 44px;"
          />
          <button
            type="button"
            class="input-action"
            id="togglePassword"
            aria-label="Show password"
            title="Show/hide password"
          >
            <!-- Eye icon -->
            <svg id="eyeShow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (hidden by default) -->
            <svg id="eyeHide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="m1 1 22 22"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            </svg>
          </button>
        </div>
        <span class="form-error" id="passwordError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Remember Me + Forgot -->
      <div class="form-row-inline">
        <label class="checkbox-wrapper" for="remember">
          <input type="checkbox" id="remember" name="remember" />
          <span class="checkbox-label">Remember me</span>
        </label>
        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
        <span class="btn-text">Sign in to your account</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>

      <!-- Divider -->
      <div class="divider">or</div>

      <!-- Google -->
      <button type="button" class="btn-google" id="googleBtn" aria-label="Continue with Google">
        <!-- Google SVG logo -->
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <!-- Sign Up -->
    <p class="signup-row">
      New to Shared Expenses?
      <a href="dashboard.html" id="signupLink">Create an account</a>
    </p>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
  <script>
    /* ─── Login Page Logic ──────────────────────────────────── */
    const loginForm    = document.getElementById('loginForm');
    const emailInput   = document.getElementById('email');
    const passwordInput= document.getElementById('password');
    const loginBtn     = document.getElementById('loginBtn');
    const togglePwdBtn = document.getElementById('togglePassword');
    const eyeShow      = document.getElementById('eyeShow');
    const eyeHide      = document.getElementById('eyeHide');
    const successOverlay = document.getElementById('successOverlay');
    const redirectProgress = document.getElementById('redirectProgress');

    /* ── Password Visibility Toggle ── */
    togglePwdBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeShow.style.display = isPassword ? 'none' : 'block';
      eyeHide.style.display = isPassword ? 'block' : 'none';
      togglePwdBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    /* ── Live Validation ── */
    emailInput.addEventListener('blur', () => {
      const err = Validator.run(emailInput.value, [Validator.required, Validator.email]);
      err ? Validator.showError(emailInput, err) : Validator.showSuccess(emailInput);
    });

    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('error') || emailInput.classList.contains('success')) {
        const err = Validator.run(emailInput.value, [Validator.required, Validator.email]);
        err ? Validator.showError(emailInput, err) : Validator.showSuccess(emailInput);
      }
    });

    passwordInput.addEventListener('blur', () => {
      const err = Validator.run(passwordInput.value, [Validator.required, Validator.minLength(6)]);
      err ? Validator.showError(passwordInput, err) : Validator.showSuccess(passwordInput);
    });

    /* ── Form Submit ── */
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      /* Validate all fields */
      const emailErr = Validator.run(emailInput.value, [Validator.required, Validator.email]);
      const pwdErr   = Validator.run(passwordInput.value, [Validator.required, Validator.minLength(6)]);

      let hasError = false;

      if (emailErr) { Validator.showError(emailInput, emailErr); hasError = true; }
      else           Validator.showSuccess(emailInput);

      if (pwdErr)   { Validator.showError(passwordInput, pwdErr); hasError = true; }
      else           Validator.showSuccess(passwordInput);

      if (hasError) {
        /* Shake the button */
        loginBtn.style.animation = 'shake 0.4s ease';
        setTimeout(() => loginBtn.style.animation = '', 400);
        ToastSystem.error({ title: 'Check your details', message: 'Please fix the errors above.' });
        return;
      }

      /* Loading state */
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      /* Simulate API call */
      await new Promise(r => setTimeout(r, 1800));

      loginBtn.classList.remove('loading');

      /* Show success */
      successOverlay.classList.add('show');

      /* Animate progress bar */
      let progress = 0;
      const interval = setInterval(() => {
        progress += 2;
        redirectProgress.style.width = progress + '%';
        if (progress >= 100) {
          clearInterval(interval);
          /* Redirect to dashboard */
          window.location.href = 'dashboard.html';
        }
      }, 30);
    });

    /* ── Google Button (UI only) ── */
    document.getElementById('googleBtn').addEventListener('click', () => {
      ToastSystem.info({ title: 'Google Sign-In', message: 'OAuth integration coming soon!' });
    });

    /* ── Forgot Password ── */
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      ToastSystem.info({ title: 'Password Reset', message: 'A reset link has been sent to your email (demo).' });
    });

    /* ── Shake animation ── */
    const style = document.createElement('style');
    style.textContent = `@keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
